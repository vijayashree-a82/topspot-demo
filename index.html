<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster Popup Demo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- Poster 1 -->
  <div class="product">
    <div class="product-card">
      <div class="popup-btn">
        <img src="poster.jpeg" class="poster-img" width="300">
      </div>
    </div>

    <div class="popup-view">
      <div class="popup-card">
        <i class="fas fa-times close-btn"></i>

        <div class="info">
          <video class="videoPlayer" controls>
            <source src="video1.mp4" type="video/mp4">
          </video>
        </div>

      </div>
    </div>
  </div>

  <!-- Poster 2 -->
  <div class="product">
    <div class="product-card">
      <div class="popup-btn">
        <img src="poster.jpeg" class="poster-img" width="300">
      </div>
    </div>

    <div class="popup-view">
      <div class="popup-card">
        <i class="fas fa-times close-btn"></i>

        <div class="info">
          <video class="videoPlayer" controls>
            <source src="video1.mp4" type="video/mp4">
          </video>
        </div>

      </div>
    </div>
  </div>

  <!-- Poster 3 -->
  <div class="product">
    <div class="product-card">
      <div class="popup-btn">
        <img src="poster.jpeg" class="poster-img" width="300">
      </div>
    </div>

    <div class="popup-view">
      <div class="popup-card">
        <i class="fas fa-times close-btn"></i>

        <div class="info">
          <video class="videoPlayer" controls>
            <source src="video1.mp4" type="video/mp4">
          </video>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
var popupViews = document.querySelectorAll('.popup-view');
var popupBtns = document.querySelectorAll('.popup-btn');
var closeBtns = document.querySelectorAll('.close-btn');
var videos = document.querySelectorAll('.videoPlayer');

// Open popup
popupBtns.forEach((btn, i) => {
  btn.addEventListener("click", () => {
    popupViews[i].classList.add("active");
    videos[i].play();
  });
});

// Close popup
closeBtns.forEach((btn, i) => {
  btn.addEventListener("click", () => {
    popupViews[i].classList.remove("active");
    videos[i].pause();
    videos[i].currentTime = 0;
  });
});

// Close on outside click
popupViews.forEach((view, i) => {
  view.addEventListener("click", (e) => {
    if (e.target === view) {
      view.classList.remove("active");
      videos[i].pause();
      videos[i].currentTime = 0;
    }
  });
});
</script>

</body>
</html>
